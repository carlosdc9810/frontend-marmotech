<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Restablecer contraseña</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 300px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="box">
    <h3>Nueva contraseña</h3>
    <input type="password" id="password" placeholder="Nueva contraseña">
    <button onclick="cambiarPassword()">Guardar</button>
    <p id="mensaje"></p>
</div>

<script>
    const API_URL = "https://backend-marmotech-production.up.railway.app";

    // Obtener token de la URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    console.log("TOKEN:", token);

    async function cambiarPassword() {
        try {
            console.log("CLICK 🔥");

            const nuevaPassword = document.getElementById("password").value;

            // Validación
            if (!nuevaPassword) {
                document.getElementById("mensaje").innerText = "Ingresa una contraseña ❌";
                return;
            }

            if (!token) {
                document.getElementById("mensaje").innerText = "Token inválido o faltante ❌";
                return;
            }

            console.log("Enviando datos...");

            const res = await fetch(`${API_URL}/reset-password`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    token: token,
                    nuevaPassword: nuevaPassword
                })
            });

            console.log("STATUS:", res.status);

            const data = await res.json();
            console.log("RESPUESTA:", data);

            document.getElementById("mensaje").innerText = data.mensaje;

            if (data.success) {
                setTimeout(() => {
                    window.location.href = "/login.html"; // ajusta si tienes login
                }, 2000);
            }

        } catch (error) {
            console.error("ERROR REAL:", error);
            document.getElementById("mensaje").innerText = "Error conectando con el servidor ❌";
        }
    }
</script>

</body>
</html>
